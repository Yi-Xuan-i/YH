server:
  port: 10086
spring:
  application:
    name: gateway
  profiles:
    active: dev
  cloud:
    nacos:
      username: nacos
      password: nacos
      server-addr: nacos:8848
      config:
        namespace: dev
      discovery:
        namespace: ${spring.cloud.nacos.config.namespace}
  config:
    import:
      - nacos:gateway-dev.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - nacos:common-dev.yaml?group=DEFAULT_GROUP&refreshEnabled=true