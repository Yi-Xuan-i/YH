server:
  port: 10089
  servlet:
    context-path: /order

spring:
  application:
    name: orderService
  profiles:
    active: dev
  cloud:
    nacos:
      username: nacos
      password: nacos
      server-addr: nacos:8848
      config:
        namespace: dev
      discovery:
        namespace: ${spring.cloud.nacos.config.namespace}
  config:
    import:
      - nacos:common-dev.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - nacos:order-dev.yaml?group=DEFAULT_GROUP&refreshEnabled=true