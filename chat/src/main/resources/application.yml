server:
  port: 10095
  servlet:
    context-path: /chat

spring:
  application:
    name: chatService
  profiles:
    active: dev
  cloud:
    nacos:
      username: nacos
      password: nacos
      server-addr: nacos:8848
      config:
        namespace: dev
      discovery:
        namespace: ${spring.cloud.nacos.config.namespace}
  config:
    import:
      - nacos:common-dev.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - nacos:chat-dev.yaml?group=DEFAULT_GROUP&refreshEnabled=true